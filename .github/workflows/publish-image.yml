name: Build and publish docker image

on:
  workflow_run:
    workflows: ["Build, run unit tests and check dockerfile"]
    types:
      - completed
  workflow_dispatch:

jobs:
  build-and-push_to_registry:
    if: ${{ github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/velosaurus-backend:latest

      - name: Show Docker Hub link
        run: echo "Docker image published to https://hub.docker.com/r/dasmuesli/velosaurus-backend"
